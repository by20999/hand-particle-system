<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hand Particle System</title>
    <link rel="icon" href="data:," />
  </head>
  <body>
    <main id="app">
      <canvas id="scene"></canvas>

      <section id="controlPanel" class="panel" aria-label="粒子控制面板">
        <div class="brand">
          <div>
            <span class="eyebrow">Realtime 3D</span>
            <h1>手势粒子场</h1>
          </div>
          <div class="brand-actions">
            <button id="panelHideBtn" class="icon-button" type="button" title="隐藏面板">
              <span aria-hidden="true"></span>
            </button>
            <button
              id="panelToggleBtn"
              class="icon-button panel-toggle"
              type="button"
              title="收起面板"
              aria-controls="panelBody"
              aria-expanded="true"
            >
              <span aria-hidden="true"></span>
            </button>
            <button id="fullscreenBtn" class="icon-button" type="button" title="全屏">
              <span aria-hidden="true"></span>
            </button>
          </div>
        </div>

        <div class="status-row">
          <span id="cameraStatus" class="status-dot idle"></span>
          <span id="statusText">等待摄像头授权</span>
        </div>
        <div id="diagnosticText" class="diagnostic">模型未启动</div>

        <div class="meter">
          <div class="meter-label">
            <span>手势张合</span>
            <strong id="gestureValue">0%</strong>
          </div>
          <div class="meter-track">
            <div id="gestureMeter" class="meter-fill"></div>
          </div>
        </div>

        <div id="panelBody" class="panel-body">
          <div class="quality-row">
            <span>画质</span>
            <strong id="qualityValue">自动</strong>
          </div>

          <div class="quality-row">
            <span>性能</span>
            <strong id="performanceValue">-- FPS · --</strong>
          </div>

          <label class="field scale-field">
            <span>面板</span>
            <span class="scale-control">
              <input id="panelScale" type="range" min="78" max="108" step="2" />
              <strong id="panelScaleValue">100%</strong>
            </span>
          </label>

          <div class="field theme-field">
            <span>控制</span>
            <div class="audio-controls utility-controls">
              <button id="gestureToggleBtn" class="small-command is-active" type="button">手势</button>
              <button id="freezeToggleBtn" class="small-command" type="button">静止</button>
            </div>
          </div>

          <div class="field theme-field">
            <span>主题</span>
            <select id="themeSelect" aria-label="主题配色"></select>
            <div id="themeButtons" class="theme-buttons" aria-label="主题配色预设">
              <button class="theme-button" type="button" data-theme="neon" title="霓虹粉蓝">
                <span class="theme-swatch"></span>
                <span>霓虹</span>
              </button>
              <button class="theme-button" type="button" data-theme="gold" title="金色暖光">
                <span class="theme-swatch"></span>
                <span>金暖</span>
              </button>
              <button class="theme-button" type="button" data-theme="ice" title="冰蓝">
                <span class="theme-swatch"></span>
                <span>冰蓝</span>
              </button>
              <button class="theme-button" type="button" data-theme="aurora" title="紫绿">
                <span class="theme-swatch"></span>
                <span>紫绿</span>
              </button>
              <button class="theme-button" type="button" data-theme="blackGold" title="黑金">
                <span class="theme-swatch"></span>
                <span>黑金</span>
              </button>
            </div>
          </div>

          <div class="field theme-field">
            <span>背景</span>
            <div id="backgroundButtons" class="theme-buttons compact-buttons" aria-label="背景氛围">
              <button class="theme-button" type="button" data-background="nebula" title="星云">
                <span class="mini-icon nebula-icon"></span>
                <span>星云</span>
              </button>
              <button class="theme-button" type="button" data-background="stage" title="柔光舞台">
                <span class="mini-icon stage-icon"></span>
                <span>舞台</span>
              </button>
              <button class="theme-button" type="button" data-background="minimal" title="极简黑场">
                <span class="mini-icon minimal-icon"></span>
                <span>黑场</span>
              </button>
              <button class="theme-button" type="button" data-background="fireworks" title="烟花夜空">
                <span class="mini-icon fireworks-icon"></span>
                <span>烟花</span>
              </button>
            </div>
          </div>

          <div class="field theme-field">
            <span>模型</span>
            <div id="modelButtons" class="model-buttons" aria-label="模型缩略图">
              <button class="model-button" type="button" data-model="heart">
                <span class="model-thumb heart-thumb"></span>
                <span>爱心</span>
              </button>
              <button class="model-button" type="button" data-model="flower">
                <span class="model-thumb flower-thumb"></span>
                <span>花朵</span>
              </button>
              <button class="model-button" type="button" data-model="saturn">
                <span class="model-thumb saturn-thumb"></span>
                <span>土星</span>
              </button>
              <button class="model-button" type="button" data-model="fireworks">
                <span class="model-thumb fireworks-thumb"></span>
                <span>烟花</span>
              </button>
              <button class="model-button" type="button" data-model="text">
                <span class="model-thumb text-thumb">字</span>
                <span>文字</span>
              </button>
              <button class="model-button more-model-button" type="button" title="更多模型即将加入" disabled>
                <span class="model-thumb more-thumb"></span>
                <span>更多</span>
              </button>
            </div>
            <select id="shapeSelect" class="visually-hidden" aria-hidden="true" tabindex="-1">
              <option value="heart">爱心</option>
              <option value="flower">花朵</option>
              <option value="saturn">土星</option>
              <option value="fireworks">烟花</option>
              <option value="text">文字</option>
            </select>
          </div>

          <label class="field text-field">
            <span>文字</span>
            <span class="text-control">
              <input id="textInput" type="text" maxlength="18" value="LOVE" />
              <button id="textApplyBtn" class="small-command" type="button">应用</button>
            </span>
          </label>

          <label class="field font-field">
            <span>字体</span>
            <select id="textFontSelect">
              <option value="modern">现代黑体</option>
              <option value="serif">优雅宋体</option>
              <option value="rounded">柔和圆体</option>
              <option value="cinema">电影标题</option>
              <option value="bubble">圆润泡泡</option>
              <option value="comic">俏皮动漫</option>
              <option value="candy">糖果手写</option>
            </select>
          </label>

          <label class="field color-field">
            <span>颜色</span>
            <input id="colorPicker" type="color" value="#ff4f8f" />
          </label>

          <label class="field sensitivity-field">
            <span>灵敏度</span>
            <span class="scale-control">
              <input id="sensitivity" type="range" min="70" max="140" step="5" value="100" />
              <strong id="sensitivityValue">100%</strong>
            </span>
          </label>

          <div class="field theme-field">
            <span>音乐</span>
            <div class="audio-controls">
              <button id="micToggleBtn" class="small-command" type="button">麦克风</button>
              <label class="file-command">
                <input id="audioFileInput" type="file" accept="audio/*" />
                <span>音频</span>
              </label>
              <button id="audioStopBtn" class="small-command" type="button">停止</button>
              <strong id="audioValue">0%</strong>
            </div>
          </div>

          <div class="hint">
            张开手掌会让粒子在 3D 空间中膨胀散开，收拢会聚回模型。鼠标拖拽旋转视角，滚轮缩放；按住 Shift
            拖动可局部扰动粒子。
          </div>

          <video id="camera" playsinline muted></video>
        </div>
      </section>

      <button id="panelRestoreBtn" class="floating-panel-button" type="button" title="显示面板" hidden>
        <span aria-hidden="true"></span>
      </button>

      <div id="audioSpectrum" class="audio-spectrum" aria-hidden="true"></div>
    </main>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
