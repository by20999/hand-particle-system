<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hand Particle System</title>
    <link rel="icon" href="data:," />
  </head>
  <body>
    <main id="app">
      <canvas id="scene"></canvas>

      <section id="controlPanel" class="panel" aria-label="粒子控制面板">
        <div class="brand">
          <div>
            <span class="eyebrow">Realtime 3D</span>
            <h1>手势粒子场</h1>
          </div>
          <div class="brand-actions">
            <button id="panelHideBtn" class="icon-button" type="button" title="隐藏面板">
              <span aria-hidden="true"></span>
            </button>
            <button
              id="panelToggleBtn"
              class="icon-button panel-toggle"
              type="button"
              title="收起面板"
              aria-controls="panelBody"
              aria-expanded="true"
            >
              <span aria-hidden="true"></span>
            </button>
            <button id="fullscreenBtn" class="icon-button" type="button" title="全屏">
              <span aria-hidden="true"></span>
            </button>
          </div>
        </div>

        <div class="status-row">
          <span id="cameraStatus" class="status-dot idle"></span>
          <span id="statusText">等待摄像头授权</span>
        </div>
        <div id="diagnosticText" class="diagnostic">模型未启动</div>
        <div id="helpText" class="help-text" hidden></div>

        <div class="meter">
          <div class="meter-label">
            <span>手势张合</span>
            <strong id="gestureValue">0%</strong>
          </div>
          <div class="meter-track">
            <div id="gestureMeter" class="meter-fill"></div>
          </div>
        </div>

        <div id="panelBody" class="panel-body">
          <details class="panel-section show-visual-section" open>
            <summary>演出与视觉</summary>
            <div class="section-content">
              <div class="field theme-field">
                <span class="field-label">
                  演出
                  <button class="help-button" type="button" data-help="按预设自动切换主题、背景、模型和烟花触发，适合无人值守展示。">?</button>
                </span>
                <div class="audio-controls show-controls">
                  <select id="showPresetSelect" aria-label="演出预设">
                    <option value="auto">自动巡演</option>
                    <option value="romance">玫瑰告白</option>
                    <option value="club">夜场烟花</option>
                    <option value="gallery">图形展台</option>
                    <option value="custom">自定义编排</option>
                  </select>
                  <button id="showPresetToggleBtn" class="small-command" type="button">巡演</button>
                </div>
              </div>

              <details class="nested-section show-composer">
                <summary>演出编排器</summary>
                <div id="showTimeline" class="show-timeline" aria-label="演出时间线"></div>

                <div class="show-editor">
                  <label class="show-editor-field">
                    <span>片段</span>
                    <input id="showStepLabel" type="text" maxlength="18" value="新片段" />
                  </label>
                  <label class="show-editor-field">
                    <span>时长</span>
                    <input id="showStepDuration" type="number" min="2" max="120" step="0.5" value="10" />
                  </label>
                  <label class="show-editor-field">
                    <span>主题</span>
                    <select id="showStepTheme"></select>
                  </label>
                  <label class="show-editor-field">
                    <span>背景</span>
                    <select id="showStepBackground">
                      <option value="nebula">星云</option>
                      <option value="stage">柔光舞台</option>
                      <option value="minimal">极简黑场</option>
                      <option value="fireworks">烟花夜空</option>
                      <option value="aurora">极光帷幕</option>
                      <option value="lattice">光网隧道</option>
                      <option value="sunset">日落霓霞</option>
                    </select>
                  </label>
                  <label class="show-editor-field">
                    <span>模型</span>
                    <select id="showStepModel">
                      <option value="heart">爱心</option>
                      <option value="flower">花朵</option>
                      <option value="saturn">土星</option>
                      <option value="cake">生日蛋糕</option>
                      <option value="fireworks">烟花</option>
                      <option value="text">文字</option>
                      <option value="ring">戒指</option>
                      <option value="balloons">气球</option>
                      <option value="pose">姿态</option>
                      <option value="image">图片</option>
                      <option value="mesh">3D</option>
                    </select>
                  </label>
                  <label class="show-editor-field">
                    <span>文字</span>
                    <input id="showStepText" type="text" maxlength="18" value="LOVE" />
                  </label>
                  <label class="show-editor-field">
                    <span class="field-label">
                      镜头
                      <button class="help-button" type="button" data-help="片段开始时平滑切换到指定视角；保持表示不主动改动当前镜头。">?</button>
                    </span>
                    <select id="showStepCamera">
                      <option value="hold">保持</option>
                      <option value="front">正面</option>
                      <option value="close">近景</option>
                      <option value="wide">远景</option>
                      <option value="left">左侧</option>
                      <option value="right">右侧</option>
                      <option value="top">俯视</option>
                      <option value="low">低角</option>
                    </select>
                  </label>
                  <label class="show-editor-field">
                    <span class="field-label">
                      模型亮度
                      <button class="help-button" type="button" data-help="这个片段开始时自动设置粒子主体亮度，适合让花朵、文字或 Logo 在不同背景下保持清晰。">?</button>
                    </span>
                    <span class="show-range-control">
                      <input id="showStepModelBrightness" type="range" min="45" max="220" step="5" value="100" />
                      <strong id="showStepModelBrightnessValue">100%</strong>
                    </span>
                  </label>
                  <label class="show-editor-field">
                    <span class="field-label">
                      背景亮度
                      <button class="help-button" type="button" data-help="这个片段开始时自动设置背景亮度；提高空间氛围，或降低以突出主体。">?</button>
                    </span>
                    <span class="show-range-control">
                      <input id="showStepBackgroundBrightness" type="range" min="35" max="220" step="5" value="100" />
                      <strong id="showStepBackgroundBrightnessValue">100%</strong>
                    </span>
                  </label>
                  <label class="show-editor-field">
                    <span class="field-label">
                      图片亮度
                      <button class="help-button" type="button" data-help="这个片段用于图片/Logo 点云的单独补光，深色图片可以设高一些。">?</button>
                    </span>
                    <span class="show-range-control">
                      <input id="showStepImageBrightness" type="range" min="60" max="480" step="5" value="280" />
                      <strong id="showStepImageBrightnessValue">280%</strong>
                    </span>
                  </label>
                  <label class="show-editor-field">
                    <span>图片大小</span>
                    <span class="show-range-control">
                      <input id="showStepImageSize" type="range" min="45" max="100" step="5" value="100" />
                      <strong id="showStepImageSizeValue">100%</strong>
                    </span>
                  </label>
                  <label class="show-editor-check">
                    <input id="showStepBurst" type="checkbox" />
                    <span class="field-label">
                      爆发
                      <button class="help-button" type="button" data-help="片段开始时触发一次扩散冲击；烟花会立即绽放，其他模型会有短促舞台爆点。">?</button>
                    </span>
                  </label>
                  <label class="show-editor-check">
                    <input id="showStepFreeze" type="checkbox" />
                    <span class="field-label">
                      静止
                      <button class="help-button" type="button" data-help="片段进入后先完成短暂过渡，再冻结画面，适合做停顿、截图或舞台定格。">?</button>
                    </span>
                  </label>
                </div>

                <div class="show-editor-actions">
                  <button id="showStepApplyBtn" class="small-command" type="button">应用</button>
                  <button id="showStepCaptureBtn" class="small-command" type="button">捕获</button>
                  <button id="showStepAddBtn" class="small-command" type="button">新增</button>
                  <button id="showStepDuplicateBtn" class="small-command" type="button">复制</button>
                  <button id="showStepDeleteBtn" class="small-command" type="button">删除</button>
                </div>

                <div class="show-editor-actions">
                  <button id="showStepExportBtn" class="small-command" type="button">导出</button>
                  <button id="showStepImportBtn" class="small-command" type="button">导入</button>
                  <button id="showStepFileImportBtn" class="small-command" type="button">文件</button>
                </div>
                <input id="showPresetFileInput" class="visually-hidden" type="file" accept="application/json,.json" />
                <textarea id="showStepJson" class="show-json" rows="4" spellcheck="false"></textarea>
              </details>

              <label class="field theme-field">
                <span class="field-label">
                  主题
                  <button class="help-button" type="button" data-help="主题会同步改变粒子主色、辅色、背景雾色、面板强调色和光源颜色。">?</button>
                </span>
                <select id="themeSelect" aria-label="主题配色"></select>
              </label>
              <div id="themeButtons" class="theme-buttons" aria-label="主题配色预设">
                <button class="theme-button" type="button" data-theme="neon" title="霓虹粉蓝">
                  <span class="theme-swatch"></span>
                  <span>霓虹</span>
                </button>
                <button class="theme-button" type="button" data-theme="gold" title="金色暖光">
                  <span class="theme-swatch"></span>
                  <span>金暖</span>
                </button>
                <button class="theme-button" type="button" data-theme="ice" title="冰蓝">
                  <span class="theme-swatch"></span>
                  <span>冰蓝</span>
                </button>
                <button class="theme-button" type="button" data-theme="aurora" title="紫绿">
                  <span class="theme-swatch"></span>
                  <span>紫绿</span>
                </button>
                <button class="theme-button" type="button" data-theme="blackGold" title="黑金">
                  <span class="theme-swatch"></span>
                  <span>黑金</span>
                </button>
              </div>

              <div class="field theme-field">
                <span class="field-label">
                  背景
                  <button class="help-button" type="button" data-help="背景只改变空间氛围，不改变当前粒子模型；更多里包含低眩光的新舞台背景。">?</button>
                </span>
                <div>
                  <div id="backgroundButtons" class="theme-buttons compact-buttons" aria-label="背景氛围">
                    <button class="theme-button" type="button" data-background="nebula" title="星云">
                      <span class="mini-icon nebula-icon"></span>
                      <span>星云</span>
                    </button>
                    <button class="theme-button" type="button" data-background="stage" title="柔光舞台">
                      <span class="mini-icon stage-icon"></span>
                      <span>舞台</span>
                    </button>
                    <button class="theme-button" type="button" data-background="minimal" title="极简黑场">
                      <span class="mini-icon minimal-icon"></span>
                      <span>黑场</span>
                    </button>
                    <button class="theme-button" type="button" data-background="fireworks" title="烟花夜空">
                      <span class="mini-icon fireworks-icon"></span>
                      <span>烟花</span>
                    </button>
                  </div>
                  <details class="nested-section background-more">
                    <summary>更多背景</summary>
                    <select id="backgroundSelect" aria-label="更多背景">
                      <option value="nebula">星云</option>
                      <option value="stage">柔光舞台</option>
                      <option value="minimal">极简黑场</option>
                      <option value="fireworks">烟花夜空</option>
                      <option value="aurora">极光帷幕</option>
                      <option value="lattice">光网隧道</option>
                      <option value="sunset">日落霓霞</option>
                    </select>
                    <div class="theme-buttons compact-buttons more-background-buttons" aria-label="更多背景快捷选择">
                      <button class="theme-button" type="button" data-background="aurora" title="极光帷幕">
                        <span class="mini-icon aurora-bg-icon"></span>
                        <span>极光</span>
                      </button>
                      <button class="theme-button" type="button" data-background="lattice" title="光网隧道">
                        <span class="mini-icon lattice-icon"></span>
                        <span>光网</span>
                      </button>
                      <button class="theme-button" type="button" data-background="sunset" title="日落霓霞">
                        <span class="mini-icon sunset-icon"></span>
                        <span>日落</span>
                      </button>
                    </div>
                  </details>
                </div>
              </div>

              <label class="field brightness-field">
                <span class="field-label">
                  背景亮度
                  <button class="help-button" type="button" data-help="调节当前背景的整体亮度；背景太暗时提高，主体被背景抢走时降低。">?</button>
                </span>
                <span class="scale-control">
                  <input id="backgroundBrightness" type="range" min="35" max="220" step="5" value="100" />
                  <strong id="backgroundBrightnessValue">100%</strong>
                </span>
              </label>
            </div>
          </details>

          <details class="panel-section model-section" open>
            <summary>模型</summary>
            <div class="section-content">
              <div class="field theme-field">
                <span class="field-label">
                  模型
                  <button class="help-button" type="button" data-help="切换粒子最终组成的形状；图片和 3D 需要先导入素材。">?</button>
                </span>
                <div id="modelButtons" class="model-buttons" aria-label="模型缩略图">
                  <button class="model-button" type="button" data-model="heart">
                    <span class="model-thumb heart-thumb"></span>
                    <span>爱心</span>
                  </button>
                  <button class="model-button" type="button" data-model="flower">
                    <span class="model-thumb flower-thumb"></span>
                    <span>花朵</span>
                  </button>
                  <button class="model-button" type="button" data-model="saturn">
                    <span class="model-thumb saturn-thumb"></span>
                    <span>土星</span>
                  </button>
                  <button class="model-button" type="button" data-model="cake">
                    <span class="model-thumb cake-thumb"></span>
                    <span>生日蛋糕</span>
                  </button>
                  <button class="model-button" type="button" data-model="fireworks">
                    <span class="model-thumb fireworks-thumb"></span>
                    <span>烟花</span>
                  </button>
                  <button class="model-button" type="button" data-model="text">
                    <span class="model-thumb text-thumb">字</span>
                    <span>文字</span>
                  </button>
                </div>
                <details class="nested-section model-more">
                  <summary>更多模型</summary>
                  <div class="model-buttons more-model-buttons" aria-label="更多模型">
                    <button class="model-button" type="button" data-model="ring">
                      <span class="model-thumb ring-thumb"></span>
                      <span>戒指</span>
                    </button>
                    <button class="model-button" type="button" data-model="balloons">
                      <span class="model-thumb balloons-thumb"></span>
                      <span>气球</span>
                    </button>
                    <button class="model-button" type="button" data-model="pose">
                      <span class="model-thumb pose-thumb"></span>
                      <span>姿态</span>
                    </button>
                    <button class="model-button" type="button" data-model="image">
                      <span class="model-thumb image-thumb"></span>
                      <span>图片</span>
                    </button>
                    <button class="model-button" type="button" data-model="mesh">
                      <span class="model-thumb mesh-thumb"></span>
                      <span>3D</span>
                    </button>
                    <button class="model-button more-model-button" type="button" data-model-placeholder title="预留更多模型">
                      <span class="model-thumb more-thumb"></span>
                      <span>更多</span>
                    </button>
                  </div>
                </details>
                <select id="shapeSelect" class="visually-hidden" aria-hidden="true" tabindex="-1">
                  <option value="heart">爱心</option>
                  <option value="flower">花朵</option>
                  <option value="saturn">土星</option>
                  <option value="cake">生日蛋糕</option>
                  <option value="fireworks">烟花</option>
                  <option value="text">文字</option>
                  <option value="ring">戒指</option>
                  <option value="balloons">气球</option>
                  <option value="pose">姿态</option>
                  <option value="image">图片</option>
                  <option value="mesh">3D</option>
                </select>
              </div>

              <label class="field text-field">
                <span class="field-label">
                  文字
                  <button class="help-button" type="button" data-help="输入文字后点击应用，粒子会重组为当前短句。">?</button>
                </span>
                <span class="text-control">
                  <input id="textInput" type="text" maxlength="18" value="LOVE" />
                  <button id="textApplyBtn" class="small-command" type="button">应用</button>
                </span>
              </label>

              <label class="field font-field">
                <span class="field-label">
                  字体
                  <button class="help-button" type="button" data-help="字体预设会改变文字采样、描边、字距和轻微扭曲效果。">?</button>
                </span>
                <select id="textFontSelect">
                  <option value="modern">现代黑体</option>
                  <option value="serif">优雅宋体</option>
                  <option value="rounded">柔和圆体</option>
                  <option value="cinema">电影标题</option>
                  <option value="bubble">圆润泡泡</option>
                  <option value="comic">俏皮动漫</option>
                  <option value="candy">糖果手写</option>
                  <option value="wheat">小麦手写</option>
                  <option value="meow">乐喵圆体</option>
                  <option value="yan">书坊颜体</option>
                </select>
              </label>

              <label class="field brightness-field">
                <span class="field-label">
                  模型亮度
                  <button class="help-button" type="button" data-help="调节所有粒子模型的主体亮度；不会改变背景亮度。">?</button>
                </span>
                <span class="scale-control has-steppers">
                  <button class="step-button" type="button" data-step-target="modelBrightness" data-step="-5" aria-label="降低模型亮度">-</button>
                  <input id="modelBrightness" type="range" min="45" max="220" step="5" value="100" />
                  <button class="step-button" type="button" data-step-target="modelBrightness" data-step="5" aria-label="提高模型亮度">+</button>
                  <strong id="modelBrightnessValue">100%</strong>
                </span>
              </label>

              <label class="field brightness-field">
                <span class="field-label">
                  模型大小
                  <button class="help-button" type="button" data-help="直接缩放粒子模型本体，和鼠标滚轮的相机远近不同；范围较大，适合投影和大屏快速定尺寸。">?</button>
                </span>
                <span class="scale-control has-steppers">
                  <button class="step-button" type="button" data-step-target="modelSize" data-step="-5" aria-label="缩小模型">-</button>
                  <input id="modelSize" type="range" min="15" max="400" step="5" value="100" />
                  <button class="step-button" type="button" data-step-target="modelSize" data-step="5" aria-label="放大模型">+</button>
                  <strong id="modelSizeValue">100%</strong>
                </span>
              </label>
            </div>
          </details>

          <details class="panel-section import-section" open>
            <summary>导入</summary>
            <div class="section-content">
              <div class="field theme-field">
                <span class="field-label">
                  素材
                  <button class="help-button" type="button" data-help="图片/Logo 会生成平面彩色点云，GLB 会按模型表面采样成 3D 点云，姿态视频会识别人体关键点并生成粒子骨架。">?</button>
                </span>
                <div class="audio-controls import-controls">
                  <label class="file-command">
                    <input id="imageFileInput" type="file" accept="image/*" />
                    <span>图片/Logo</span>
                  </label>
                  <label class="file-command">
                    <input id="meshFileInput" type="file" accept=".glb,model/gltf-binary" />
                    <span>GLB模型</span>
                  </label>
                  <label class="file-command">
                    <input id="poseVideoInput" type="file" accept="video/*" />
                    <span>姿态视频</span>
                  </label>
                </div>
              </div>

              <div id="importProgress" class="import-progress" hidden>
                <div class="import-progress-head">
                  <span id="importProgressLabel">准备导入</span>
                  <strong id="importProgressValue">0%</strong>
                </div>
                <div class="import-progress-track">
                  <div id="importProgressFill" class="import-progress-fill"></div>
                </div>
              </div>

              <details class="nested-section image-settings">
                <summary>图片/Logo 细节</summary>
                <label class="field image-option-field">
                  <span class="field-label">
                    轮廓
                    <button class="help-button" type="button" data-help="越高越优先采样边缘；越低越保留内部颜色和纹理。">?</button>
                  </span>
                  <span class="scale-control">
                    <input id="imageContour" type="range" min="0" max="1" step="0.05" value="0.55" />
                    <strong id="imageContourValue">55%</strong>
                  </span>
                </label>

                <label class="field image-option-field">
                  <span class="field-label">
                    图色
                    <button class="help-button" type="button" data-help="原色尽量还原图片；灰度只保留明暗；单色用下方颜色给图片重新着色。">?</button>
                  </span>
                  <select id="imageColorMode">
                    <option value="original">原色</option>
                    <option value="luminance">灰度</option>
                    <option value="monochrome">单色</option>
                  </select>
                </label>

                <label class="field image-option-field">
                  <span class="field-label">单色</span>
                  <input id="imageMonoColor" type="color" value="#ff4f8f" />
                </label>

                <label class="field image-option-field">
                  <span class="field-label">
                    透明
                    <button class="help-button" type="button" data-help="控制导入图片粒子的整体透明度，不会改动原图文件。">?</button>
                  </span>
                  <span class="scale-control">
                    <input id="imageAlpha" type="range" min="0" max="1" step="0.05" value="1" />
                    <strong id="imageAlphaValue">100%</strong>
                  </span>
                </label>

                <label class="field image-option-field">
                  <span class="field-label">
                    亮度
                    <button class="help-button" type="button" data-help="只增强图片/Logo 点云亮度，适合深色图片或低对比度 Logo。">?</button>
                  </span>
                  <span class="scale-control has-steppers">
                    <button class="step-button" type="button" data-step-target="imageBrightness" data-step="-5" aria-label="降低图片亮度">-</button>
                    <input id="imageBrightness" type="range" min="60" max="480" step="5" value="280" />
                    <button class="step-button" type="button" data-step-target="imageBrightness" data-step="5" aria-label="提高图片亮度">+</button>
                    <strong id="imageBrightnessValue">280%</strong>
                  </span>
                </label>

                <label class="field image-option-field">
                  <span class="field-label">
                    大小
                    <button class="help-button" type="button" data-help="调节图片点云大小；调小会同步减少绘制粒子数，调到最大使用当前画质档全部粒子。">?</button>
                  </span>
                  <span class="scale-control has-steppers">
                    <button class="step-button" type="button" data-step-target="imageSize" data-step="-5" aria-label="缩小图片粒子">-</button>
                    <input id="imageSize" type="range" min="45" max="100" step="5" value="100" />
                    <button class="step-button" type="button" data-step-target="imageSize" data-step="5" aria-label="放大图片粒子">+</button>
                    <strong id="imageSizeValue">100%</strong>
                  </span>
                </label>

                <label class="field image-option-field">
                  <span class="field-label">
                    Logo
                    <button class="help-button" type="button" data-help="二值模式适合黑白 Logo，会自动判断前景并强化边界。">?</button>
                  </span>
                  <span class="toggle-row">
                    <input id="imageLogoMode" type="checkbox" />
                    <span>二值轮廓</span>
                  </span>
                </label>

                <label class="field image-option-field">
                  <span class="field-label">
                    内部
                    <button class="help-button" type="button" data-help="Logo 模式下保留内部填充点的比例，越高越厚实。">?</button>
                  </span>
                  <span class="scale-control">
                    <input id="imageInteriorRatio" type="range" min="0.25" max="0.7" step="0.05" value="0.5" />
                    <strong id="imageInteriorRatioValue">50%</strong>
                  </span>
                </label>
              </details>

              <details class="nested-section mesh-settings">
                <summary>GLB 细节</summary>
                <label class="field image-option-field">
                  <span class="field-label">
                    密度
                    <button class="help-button" type="button" data-help="控制 3D 点云绘制粒子量；越高表面越细，越低越流畅。重新导入 GLB 时也会影响采样目标。">?</button>
                  </span>
                  <span class="scale-control has-steppers">
                    <button class="step-button" type="button" data-step-target="meshDensity" data-step="-5" aria-label="降低 GLB 密度">-</button>
                    <input id="meshDensity" type="range" min="25" max="120" step="5" value="100" />
                    <button class="step-button" type="button" data-step-target="meshDensity" data-step="5" aria-label="提高 GLB 密度">+</button>
                    <strong id="meshDensityValue">100%</strong>
                  </span>
                </label>

                <label class="field image-option-field">
                  <span class="field-label">
                    大小
                    <button class="help-button" type="button" data-help="只缩放导入的 GLB 点云目标，不影响其他内置模型。">?</button>
                  </span>
                  <span class="scale-control has-steppers">
                    <button class="step-button" type="button" data-step-target="meshSize" data-step="-5" aria-label="缩小 GLB">-</button>
                    <input id="meshSize" type="range" min="25" max="260" step="5" value="100" />
                    <button class="step-button" type="button" data-step-target="meshSize" data-step="5" aria-label="放大 GLB">+</button>
                    <strong id="meshSizeValue">100%</strong>
                  </span>
                </label>

                <label class="field image-option-field">
                  <span class="field-label">
                    厚度
                    <button class="help-button" type="button" data-help="拉伸或压缩 GLB 点云的前后深度；偏平模型可适当提高。">?</button>
                  </span>
                  <span class="scale-control has-steppers">
                    <button class="step-button" type="button" data-step-target="meshDepth" data-step="-5" aria-label="降低 GLB 厚度">-</button>
                    <input id="meshDepth" type="range" min="20" max="240" step="5" value="100" />
                    <button class="step-button" type="button" data-step-target="meshDepth" data-step="5" aria-label="提高 GLB 厚度">+</button>
                    <strong id="meshDepthValue">100%</strong>
                  </span>
                </label>

                <label class="field image-option-field">
                  <span class="field-label">
                    表面
                    <button class="help-button" type="button" data-help="控制 GLB 表面粒子的微抖动厚度；越低越贴合模型，越高越有粒子雾化感。">?</button>
                  </span>
                  <span class="scale-control has-steppers">
                    <button class="step-button" type="button" data-step-target="meshSpread" data-step="-5" aria-label="降低表面扩散">-</button>
                    <input id="meshSpread" type="range" min="0" max="200" step="5" value="100" />
                    <button class="step-button" type="button" data-step-target="meshSpread" data-step="5" aria-label="提高表面扩散">+</button>
                    <strong id="meshSpreadValue">100%</strong>
                  </span>
                </label>
              </details>

              <details class="nested-section pose-settings">
                <summary>姿态视频细节</summary>
                <label class="field image-option-field">
                  <span class="field-label">
                    骨架密度
                    <button class="help-button" type="button" data-help="控制姿态骨架可见粒子量；越高越细腻，越低越流畅。">?</button>
                  </span>
                  <span class="scale-control has-steppers">
                    <button class="step-button" type="button" data-step-target="poseDensity" data-step="-5" aria-label="降低姿态密度">-</button>
                    <input id="poseDensity" type="range" min="35" max="160" step="5" value="100" />
                    <button class="step-button" type="button" data-step-target="poseDensity" data-step="5" aria-label="提高姿态密度">+</button>
                    <strong id="poseDensityValue">100%</strong>
                  </span>
                </label>

                <label class="field image-option-field">
                  <span class="field-label">
                    跟随
                    <button class="help-button" type="button" data-help="控制姿态视频抽帧频率；越高动作越跟手，但会增加设备压力。">?</button>
                  </span>
                  <span class="scale-control has-steppers">
                    <button class="step-button" type="button" data-step-target="poseFollow" data-step="-5" aria-label="降低姿态跟随">-</button>
                    <input id="poseFollow" type="range" min="45" max="180" step="5" value="100" />
                    <button class="step-button" type="button" data-step-target="poseFollow" data-step="5" aria-label="提高姿态跟随">+</button>
                    <strong id="poseFollowValue">100%</strong>
                  </span>
                </label>

                <label class="field image-option-field">
                  <span class="field-label">
                    光晕
                    <button class="help-button" type="button" data-help="控制姿态关节与手脚端点的额外光晕数量；越高越有舞台拖影感。">?</button>
                  </span>
                  <span class="scale-control has-steppers">
                    <button class="step-button" type="button" data-step-target="poseAura" data-step="-5" aria-label="降低姿态光晕">-</button>
                    <input id="poseAura" type="range" min="0" max="180" step="5" value="100" />
                    <button class="step-button" type="button" data-step-target="poseAura" data-step="5" aria-label="提高姿态光晕">+</button>
                    <strong id="poseAuraValue">100%</strong>
                  </span>
                </label>
              </details>
            </div>
          </details>

          <details class="panel-section interaction-section" open>
            <summary>交互</summary>
            <div class="section-content">
              <div class="field theme-field">
                <span class="field-label">
                  控制
                  <button class="help-button" type="button" data-help="手势开关会暂停摄像头输入；静止会冻结画面运动方便观察和截图。">?</button>
                </span>
                <div class="audio-controls utility-controls">
                  <button id="gestureToggleBtn" class="small-command is-active" type="button">手势</button>
                  <button id="freezeToggleBtn" class="small-command" type="button">静止</button>
                </div>
              </div>

              <label class="field color-field">
                <span class="field-label">
                  颜色
                  <button class="help-button" type="button" data-help="手动覆盖粒子主色；选择主题后会重新同步为主题主色。">?</button>
                </span>
                <input id="colorPicker" type="color" value="#ff4f8f" />
              </label>

              <label class="field sensitivity-field">
                <span class="field-label">
                  灵敏度
                  <button class="help-button" type="button" data-help="调高手势张开/收拢的响应幅度；手势变化不明显时可适当提高。">?</button>
                </span>
                <span class="scale-control">
                  <input id="sensitivity" type="range" min="70" max="140" step="5" value="100" />
                  <strong id="sensitivityValue">100%</strong>
                </span>
              </label>

              <label class="field sensitivity-field">
                <span class="field-label">
                  指向
                  <button class="help-button" type="button" data-help="单独调节食指指向模式的移动幅度；不会影响张开手掌的扩散灵敏度。">?</button>
                </span>
                <span class="scale-control">
                  <input id="pointingSensitivity" type="range" min="60" max="180" step="5" value="120" />
                  <strong id="pointingSensitivityValue">120%</strong>
                </span>
              </label>

              <video id="camera" playsinline muted></video>
            </div>
          </details>

          <details class="panel-section music-section">
            <summary>音乐</summary>
            <div class="section-content">
              <div class="field theme-field">
                <span class="field-label">
                  音乐
                  <button class="help-button" type="button" data-help="麦克风或本地音频会驱动模型缩放、位移、旋转、拖尾、Bloom 和底部频谱条。">?</button>
                </span>
                <div class="audio-controls">
                  <button id="micToggleBtn" class="small-command" type="button">麦克风</button>
                  <label class="file-command">
                    <input id="audioFileInput" type="file" accept="audio/*" />
                    <span>音频</span>
                  </label>
                  <button id="audioStopBtn" class="small-command" type="button">停止</button>
                  <strong id="audioValue">0%</strong>
                </div>
              </div>
            </div>
          </details>

          <details class="panel-section system-section">
            <summary>系统</summary>
            <div class="section-content">
              <div class="quality-row">
                <span>画质</span>
                <strong id="qualityValue">自动</strong>
              </div>

              <div class="quality-row">
                <span>性能</span>
                <strong id="performanceValue">-- FPS · --</strong>
              </div>

              <label class="field scale-field">
                <span class="field-label">
                  面板
                  <button class="help-button" type="button" data-help="只缩放控制面板，不影响 WebGL 画面比例。">?</button>
                </span>
                <span class="scale-control">
                  <input id="panelScale" type="range" min="78" max="108" step="2" />
                  <strong id="panelScaleValue">100%</strong>
                </span>
              </label>
            </div>
          </details>
        </div>
      </section>

      <button id="panelRestoreBtn" class="floating-panel-button" type="button" title="显示面板" hidden>
        <span aria-hidden="true"></span>
      </button>

      <div id="audioSpectrum" class="audio-spectrum" aria-hidden="true"></div>
    </main>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
